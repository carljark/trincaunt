# /etc/nginx/nginx.conf

user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    gzip on;
    gzip_disable "msie6";

    # Servidor virtual para co2univ.ddns.net
    server {
        listen 4433 ssl;
        server_name co2univ.ddns.net;

        # --- Certificados SSL (Sustituir con las rutas reales) ---
        # Es recomendable usar Let's Encrypt para obtener certificados gratuitos.
        # Ejemplo de rutas con certbot:
        ssl_certificate /etc/letsencrypt/live/co2univ.ddns.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/co2univ.ddns.net/privkey.pem;

        # --- Configuración del proxy inverso ---
        location / {
            # Sustituir con la IP y puerto de la aplicación real
            proxy_pass http://localhost:3001; 

            # Cabeceras importantes para el proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Configuración para WebSockets (si la aplicación los usa)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Servidor virtual para trincaunt.ddns.net
    server {
        listen 4433 ssl;
        server_name trincaunt.ddns.net;

        # --- Certificados SSL (Sustituir con las rutas reales) ---
        ssl_certificate /etc/letsencrypt/live/trincaunt.ddns.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/trincaunt.ddns.net/privkey.pem;

        # --- Configuración del proxy inverso ---
        location / {
            # Sustituir con la IP y puerto de la aplicación real
            proxy_pass http://localhost:3002;

            # Mismas cabeceras de proxy que el otro servidor
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
